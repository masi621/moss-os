insmod all_video
insmod gfxterm
insmod gfxterm_background
insmod png
insmod font

if loadfont /boot/grub/fonts/unicode.pf2; then
  set gfxmode=auto
  terminal_output gfxterm
fi

set theme=/boot/grub/themes/moss/theme.txt
export theme
if background_image /boot/grub/themes/moss/wall-green.png; then
  true
fi

set timeout=4
set timeout_style=countdown
set default=0
set MOSS_BOOT_PARAMS="quiet loglevel=3 rd.udev.log_level=3 vt.global_cursor_default=0"

menuentry "mOSs 1.0" --class moss --class gnu-linux --class os {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod ext2
    insmod iso9660
    search --set=root --file /boot/vmlinuz --no-floppy
    linux /boot/vmlinuz ${MOSS_BOOT_PARAMS} init=/init
    initrd /boot/initrd.img
}

menuentry "mOSs 1.0 [Desktop]" --class moss {
    insmod gzio
    insmod iso9660
    search --set=root --file /boot/vmlinuz --no-floppy
    linux /boot/vmlinuz ${MOSS_BOOT_PARAMS} init=/init MOSS_STARTUP_MODE=wm
    initrd /boot/initrd.img
}

menuentry "mOSs 1.0 [Recovery / Verbose]" --class moss {
    insmod gzio
    insmod iso9660
    search --set=root --file /boot/vmlinuz --no-floppy
    linux /boot/vmlinuz init=/init loglevel=7 panic=0
    initrd /boot/initrd.img
}

menuentry "System Firmware / BIOS setup" {
    fwsetup
}
